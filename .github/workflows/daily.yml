name: Daily Secretary

# Runs once a day at 5:17 UTC.
# Summer (CEST): ~07:17 Paris.  Winter (CET): ~06:17 Paris.
# Using :17 instead of :00 to dodge GitHub Actions cron congestion.
on:
  schedule:
    - cron: "11 0 * * *"
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

jobs:
  send-journal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
      NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
      GOOGLE_TOKEN_JSON:  ${{ secrets.GOOGLE_TOKEN_JSON }}
      USER_NAME:          "Leo"
      USER_CITY:          "Paris"
      USER_LATITUDE:      "48.8566"
      USER_LONGITUDE:     "2.3522"
      USER_TIMEZONE:      "Europe/Paris"
      USER_GRADE:         "Grade 12 (Terminale)"
      USER_COUNTRY:       "France"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily secretary
        run: python main.py
