name: Daily Secretary

# Runs at 5:00 UTC (=07:00 Paris in summer) and 6:00 UTC (=07:00 Paris in winter).
# main.py only sends if the Paris-local hour is 7, so exactly one email lands per day.
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

jobs:
  send-journal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
      NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
      GOOGLE_TOKEN_JSON:  ${{ secrets.GOOGLE_TOKEN_JSON }}
      USER_NAME:          "Leo"
      USER_CITY:          "Paris"
      USER_LATITUDE:      "48.8566"
      USER_LONGITUDE:     "2.3522"
      USER_TIMEZONE:      "Europe/Paris"
      USER_GRADE:         "Grade 12 (Terminale)"
      USER_COUNTRY:       "France"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate by Paris local hour
        id: gate
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          import pytz
          paris_hour = datetime.now(pytz.timezone("Europe/Paris")).hour
          send = (paris_hour == 7)
          print(f"Paris hour={paris_hour}, send={send}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"send={'true' if send else 'false'}\n")
          PY

      - name: Run daily secretary
        if: steps.gate.outputs.send == 'true'
        run: python main.py

      - name: Skip (not 7am Paris)
        if: steps.gate.outputs.send != 'true'
        run: echo "Skipped — not 7am Paris local time."
